name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: |
          python -m py_compile main.py paths.py bridge.py gui.py polish.py config.py \
            hotkeys.py typer.py app_icon.py windows_startup.py term_bank.py
